# MetalLB Application — Helm chart + repo-side config.
# Sync wave 0: must come first so LoadBalancer services (including
# argocd-server itself) get IPs assigned.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default

  sources:
    - repoURL: https://metallb.github.io/metallb
      chart: metallb
      targetRevision: 0.14.9
      helm:
        releaseName: metallb
    - repoURL: https://github.com/trumpet7347/homelab.git
      targetRevision: main
      path: argocd/apps-config/metallb

  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system

  # The MetalLB CRDs (bgppeers etc.) get default-populated fields from the
  # K8s API server that aren't in the chart's rendered manifest, causing
  # constant OutOfSync drift. Ignore those specific fields so the comparison
  # is stable.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/preserveUnknownFields
        - /spec/conversion

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
